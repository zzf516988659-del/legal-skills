# project-init 配置示例
# 复制本文件为 profiles.yaml 并根据需要自定义
#
# 用法：cp profiles.example.yaml profiles.yaml

# ── 技能源 ──────────────────────────────────────────────
# 键名（如 legal-skills）供下方 profiles.*.skills 引用；
# 值为技能目录的本地绝对路径（支持 ~ 展开）。
skill_sources:
  legal-skills: ~/Library/Application Support/maoscripts/skills/legal-skills/skills
  # private-skills: ~/Library/Application Support/maoscripts/skills/legal-skills/private-skills
  # myagents: ~/.myagents/skills

# ── 配置文件 ──────────────────────────────────────────────
# 每个配置都是一个识别模板：通过 detect 规则自动匹配项目类型，
# 并为匹配的项目注入技能、文档和 Claude 指令。
profiles:

  # ── 示例 1：开发项目 ──────────────────────────────────
  # 检测到任意一个包管理文件即匹配
  development:
    display_name: 开发项目
    detect:
      any_of:                       # 文件名匹配（项目根目录）
        - package.json
        - pyproject.toml
        - Cargo.toml
        - go.mod
        - requirements.txt
        - Gemfile
        - pom.xml
        - build.gradle
        - composer.json
        - Makefile
    skills:                         # 按 skill_sources 的键名分组
      legal-skills:
        - git-batch-commit
        - skill-lint
        - repo-research
      # myagents:
      #   - task-alignment
      #   - task-implement
    claude_md: development          # 使用的 CLAUDE.md 模板名（templates/ 目录下）
    docs:                           # 项目初始化时创建的文档列表
      - docs/ROADMAP.md
      - docs/DECISIONS.md
      - docs/ISSUES.md

  # ── 示例 2：Skill 开发项目 ────────────────────────────
  # 使用 has_skill_md: true 检测包含 skill.md 的项目
  skill-project:
    display_name: Skill 开发项目
    detect:
      has_skill_md: true            # 项目根目录存在 skill.md 即匹配
    skills:
      legal-skills:
        - skill-lint
        - skill-architect
        - skill-manager
        - git-batch-commit
    claude_md: skill-project
    scaffold:                       # 项目初始化时创建的子目录
      - references
      - scripts
      - assets
    docs:
      - CHANGELOG.md
      - DECISIONS.md

  # ── 示例 3：前端项目 ──────────────────────────────────
  frontend:
    display_name: 前端项目
    detect:
      any_of:
        - tailwind.config.js
        - tailwind.config.ts
        - next.config.js
        - next.config.ts
        - vite.config.ts
        - nuxt.config.ts
    skills:
      legal-skills:
        - frontend-design
        - webapp-testing
        - git-batch-commit
    claude_md: frontend
    docs:
      - docs/ROADMAP.md
      - docs/DECISIONS.md
      - docs/ISSUES.md

  # ── 示例 4：数据分析项目 ──────────────────────────────
  # 演示 dir_patterns（目录名匹配）和 glob 扩展名检测
  data-analysis:
    display_name: 数据分析项目
    detect:
      any_of:
        - '*.ipynb'                 # glob 模式匹配文件扩展名
      dir_patterns:                 # 项目根目录下存在任一命名目录即匹配
        - notebooks
        - data
        - analysis
    skills:
      legal-skills:
        - data-analysis
        - mineru-ocr
    claude_md: data-analysis
    docs:
      - docs/ROADMAP.md
      - docs/DECISIONS.md

  # ── 示例 5：法律文档项目 ──────────────────────────────
  # 演示 extensions + min_count 组合条件
  legal-document:
    display_name: 法律文档项目
    detect:
      extensions:                   # 统计项目根目录下这些扩展名的文件数
        - .docx
        - .pdf
        - .doc
      min_count: 3                  # 文件数 ≥ min_count 时匹配
    skills:
      legal-skills:
        - mineru-ocr
        - paddle-ocr
        - legal-text-format
        - md2word
    claude_md: simple

  # ── 示例 6：内容写作项目 ──────────────────────────────
  # 纯 dir_patterns 检测示例
  content-writing:
    display_name: 内容写作项目
    detect:
      dir_patterns:
        - blog
        - posts
        - articles
        - content
        - drafts
    skills:
      legal-skills:
        - de-ai-polish
        - wechat-article-fetch
    claude_md: simple

# ── 默认配置 ──────────────────────────────────────────────
# 所有 detect 规则均未匹配时使用此配置
default_profile: development
